      parameters:
        - $ref: '#/components/parameters/sessionId'
        - name: source_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Context source ID
      responses:
        '200':
          description: Updated context source row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextSource'
        '400':
          description: Ingest failure (e.g. source session no longer has SESSION.md)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions or tier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: File sources cannot be refreshed — re-upload required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
