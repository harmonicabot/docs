      responses:
        '200':
          description: Proposed welcome message and meta description
          content:
            application/json:
              schema:
                type: object
                properties:
                  welcome_message:
                    type: string
                    description: Participant-facing welcome copy shown on the session landing page.
                  meta_description:
                    type: string
                    description: Short description used for link previews.
                required: [welcome_message, meta_description]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          description: LLM generation failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /projects/{id}/context-sources:
    get:
      summary: List project context sources
      description: |
        List the project (workspace) level context sources, ordered by position then
        created_at. Project sources apply to every session inside the project (merged
        ahead of each session's own sources, MCP deduped by URL). `inheritedSources`
        (HAR-1166) additionally lists every source attached to a session inside the
        project — read-only here, managed on its session, each tagged with `session_topic`.
        No tier check on read.
      operationId: listProjectContextSources
      tags: [Context Sources]
      parameters:
        - name: id
          in: path
          required: true
          description: Project (workspace) ID.
          schema: { type: string }
      responses:
        '200':
          description: Project context sources
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: array
                    items: { type: object }
                  inheritedSources:
                    type: array
                    description: Session-attached sources surfaced read-only at the project level.
                    items:
                      type: object
                      properties:
                        session_topic: { type: string, nullable: true }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions
  /projects/{id}/context-sources/file:
    post:
      summary: Upload a project file context source
      description: |
        Upload a file (Markdown, plain text, or PDF) as a project-level context source.
        PDFs are extracted to text via pdf2json. Files whose text is <= 50 KB are stored
        verbatim; larger files are chunked and embedded. Max 4 MB, max 20 sources per
        project. Requires a Pro, LTD, or ENTERPRISE subscription.
      operationId: uploadProjectContextSourceFile
      tags: [Context Sources]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "Allowed types: text/plain, text/markdown, application/pdf."
                title: { type: string }
      responses:
        '201': { description: Context source created }
        '400': { description: Validation error (unsupported type, oversized, or a PDF with no extractable text) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Insufficient permissions or tier }
        '422': { description: Source cap reached (20 per project) }
  /projects/{id}/context-sources/session:
    post:
      summary: Reference a session as a project context source
      description: |
        Snapshot another session's SESSION.md and attach it at the project level.
        Requires editor access on the project and viewer access on the source session.
        Requires a Pro, LTD, or ENTERPRISE subscription.
      operationId: addProjectContextSourceSession
      tags: [Context Sources]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_ref]
              properties:
                source_ref:
                  type: string
                  description: ID of the session whose SESSION.md to snapshot.
                title: { type: string }
      responses:
        '201': { description: Context source created }
        '400': { description: Validation error (missing source_ref or source has no SESSION.md) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: No access to project or source session }
        '422': { description: Source cap reached (20 per project) }
  /projects/{id}/context-sources/mcp:
    post:
      summary: Register an MCP server as a project context source
      description: |
        Register an MCP server at the project level. Performs a handshake to enumerate
        tools and validates any allowlist. Requires a Pro, LTD, or ENTERPRISE subscription.
      operationId: addProjectContextSourceMcp
      tags: [Context Sources]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, title]
              properties:
                url: { type: string }
                title: { type: string }
                bearer: { type: string, nullable: true }
                tool_allowlist:
                  type: array
                  items: { type: string }
                  nullable: true
      responses:
        '201': { description: Context source created }
        '400': { description: Validation error (handshake failed or allowlist mismatch) }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Insufficient permissions or tier }
        '422': { description: Source cap reached (20 per project) }
  /projects/{id}/context-sources/{source_id}:
    patch:
      summary: Update a project context source
      description: |
        Update a project context source's title, position, mcp_config, or a single
        knowledge-curation toggle. Requires a Pro, LTD, or ENTERPRISE subscription.
      operationId: updateProjectContextSource
      tags: [Context Sources]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: source_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                position: { type: integer }
                mcp_config: { type: object }
                curation:
                  type: object
                  description: |
                    Toggle one extracted-knowledge item's keep/drop/pin status,
                    merged into the source's curation map (status `kept` removes the
                    override). Kept + pinned items feed facilitation instead of the
                    raw transcript; pinned sorts first.
                  properties:
                    itemId: { type: string }
                    status: { type: string, enum: [kept, pinned, dropped] }
                  required: [itemId, status]
      responses:
        '200': { description: Updated source }
        '400': { description: No fields to update }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Insufficient permissions or tier }
        '404': { description: Source not found in this project }
    delete:
      summary: Delete a project context source
      description: |
        Delete a project context source. Cascades to session_embeddings via FK.
        Requires a Pro, LTD, or ENTERPRISE subscription.
      operationId: deleteProjectContextSource
      tags: [Context Sources]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: source_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Insufficient permissions or tier }
        '404': { description: Source not found }
  /projects/{id}/context-sources/{source_id}/refresh:
    post:
      summary: Refresh a project context source
      description: |
        Re-snapshot a session reference or re-handshake an MCP source at the project
        level. File sources cannot be refreshed (re-upload required). Requires a Pro,
        LTD, or ENTERPRISE subscription.
      operationId: refreshProjectContextSource
      tags: [Context Sources]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: source_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Refreshed source }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Insufficient permissions or tier }
        '404': { description: Source not found }
        '422': { description: File sources cannot be refreshed }
  /sessions/{id}/context-sources/file:
    post:
      summary: Upload a file context source
      description: |
        Upload a file (Markdown, plain text, or PDF) as a context source for the session.
        PDFs are extracted to text via pdf2json; the extracted text then follows the same size
        rule. Files whose text is ≤ 50 KB are stored verbatim in the source row; larger files
        are chunked and embedded into `session_embeddings` for vector search. A PDF with no
        extractable text layer (scanned / image-only) is rejected with a 400.

        Allowed MIME types: `text/markdown`, `text/plain`, `application/pdf`.
        Maximum file size: 4 MB (Vercel route body limit).
        Maximum sources per session: 20.

        Requires a Pro, LTD, or ENTERPRISE subscription.
      operationId: uploadContextSourceFile
      tags: [Context Sources]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "File to upload. Allowed types: text/plain, text/markdown, application/pdf."
                title:
                  type: string
                  description: |
                    Human-readable title for the source. Defaults to the file name if omitted.
      responses:
        '201':
          description: Context source created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Unique ID of the new context source row.
                  session_id:
                    type: string
                    format: uuid
                  source_type:
                    type: string
                    enum: [file]
                  title:
                    type: string
                  content_mode:
                    type: string
                    enum: [verbatim, chunked]
                    description: |
                      `verbatim` — full text stored in the row; `chunked` — text split and
                      embedded in `session_embeddings` for vector retrieval.
                  created_at:
                    type: string
                    format: date-time
                required: [id, session_id, source_type, title, content_mode, created_at]
        '400':
          description: |
            Validation error — missing file, oversized, unsupported MIME type, or a PDF with
            no extractable text layer (scanned / image-only).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: validation_error
                  message: 'Unsupported file type: image/png (filename: chart.png). Allowed: .md, .markdown, .txt, .pdf'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions or tier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: forbidden
                  message: Context sources require a Pro subscription
        '422':
          description: Source cap reached (20 per session)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: validation_error
                  message: Source cap reached (20 per session)
        '500':
          description: Ingestion or embedding failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/{id}/context-sources:
    get:
      summary: List context sources
      description: |
        Returns all context sources attached to the session, ordered by position then created_at.
        No tier requirement — read path is unconditional.
      operationId: listContextSources
      tags: [Context Sources]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: List of context sources
          content:
            application/json:
              schema:
                type: object
                required: [sources]
                properties:
                  sources:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContextSource'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /sessions/{id}/context-sources/session:
    post:
      summary: Add a session reference as a context source
      description: |
        Snapshot another session's SESSION.md and add it as a context source.
        The content is captured at add-time (not live). Use `/refresh` to re-snapshot.

        The caller must have at least **viewer** access on the source session.
        Requires a Pro, LTD, or ENTERPRISE subscription.
        Maximum 20 sources per session.
      operationId: addSessionContextSource
      tags: [Context Sources]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_ref]
              properties:
                source_ref:
                  type: string
                  format: uuid
                  description: ID of the session whose SESSION.md to snapshot.
                title:
                  type: string
                  description: |
                    Human-readable title. Defaults to the source session's topic if omitted.
      responses:
        '201':
          description: Context source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextSource'
        '400':
          description: Validation error (missing source_ref, source has no SESSION.md)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions or tier, or no access to source session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Source cap reached (20 per session)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/{id}/context-sources/url:
    post:
      summary: Add a web page (URL) as a context source
      description: |
        Fetch a web page, scrape it to markdown, and add it as a context source.
        The page is captured as a snapshot at add-time (`source_ref` holds the URL).
        Use `/refresh` to re-scrape the latest version.

        Requires a Pro, LTD, or ENTERPRISE subscription.
        Maximum 20 sources per session.
      operationId: addUrlContextSource
      tags: [Context Sources]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  description: The http/https URL of the page to scrape. Private/local addresses are rejected.
                title:
                  type: string
                  description: Human-readable title. Defaults to the scraped page title if omitted.
      responses:
        '201':
          description: URL context source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextSource'
        '400':
          description: Validation error (missing/invalid URL, blocked host, empty/unreachable page)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions or tier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Source cap reached (20 per session)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/{id}/context-sources/mcp:
    post:
      summary: Add an MCP server as a context source
      description: |
        Perform an MCP handshake, enumerate available tools, and register the server
        as a context source. The tool list is cached in `mcp_config.cached_tools`.
        Use `/refresh` to re-enumerate tools when the server changes.

        Requires a Pro, LTD, or ENTERPRISE subscription.
        Maximum 20 sources per session.
      operationId: addMcpContextSource
      tags: [Context Sources]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, title]
              properties:
                url:
                  type: string
                  format: uri
                  description: SSE endpoint of the MCP server.
                bearer:
                  type: string
                  nullable: true
                  description: Optional Bearer token for authenticated MCP servers.
                tool_allowlist:
                  type: array
                  nullable: true
                  items:
                    type: string
                  description: |
                    If provided, only these tools will be used. All listed tools must exist
                    on the server or the request fails with 400.
                title:
                  type: string
                  description: Human-readable name for this MCP source.
      responses:
        '201':
          description: MCP context source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextSource'
        '400':
          description: Validation error (missing fields, allowlist mismatch, handshake failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: validation_error
                  message: "MCP server doesn't expose allowlisted tools: missing_tool"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions or tier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Source cap reached (20 per session)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/{id}/context-sources/{source_id}:
    patch:
      summary: Update a context source
      description: |
        Update a context source's title, position, mcp_config, or a single
        knowledge-curation toggle. At least one field must be provided.
        Requires a Pro, LTD, or ENTERPRISE subscription.
      operationId: updateContextSource
      tags: [Context Sources]
      parameters:
        - $ref: '#/components/parameters/sessionId'
