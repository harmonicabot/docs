          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Context source ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: New display title.
                position:
                  type: integer
                  description: New sort position (lower = earlier in prompt).
                mcp_config:
                  type: object
                  description: Partial MCP config override (advanced use).
                curation:
                  type: object
                  description: |
                    Toggle one extracted-knowledge item's keep/drop/pin status
                    (HAR-1155), merged into the source's curation map (status `kept`
                    removes the override). Kept + pinned items feed facilitation
                    instead of the raw transcript; pinned sorts first.
                  properties:
                    itemId: { type: string }
                    status: { type: string, enum: [kept, pinned, dropped] }
                  required: [itemId, status]
      responses:
        '200':
