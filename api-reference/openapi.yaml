          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextSource'
        '400':
          description: Validation error (no fields to update, invalid body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Insufficient permissions or tier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
