    post:
      summary: Register a Telegram group
      description: |
        Register or update a Telegram group on the authenticated user's account.
        If the group is already registered (same user + group_id), the name and topic_id are updated.
        Called by the Telegram bot during `/setup`.
      operationId: registerTelegramGroup
      tags: [Integrations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterTelegramGroupRequest'
      responses:
        '201':
          description: Group registered (or updated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramGroup'
        '400':
          description: Validation error (missing group_id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /integrations/telegram/groups/{groupId}:
    delete:
      summary: Unregister a Telegram group
      description: Remove a Telegram group from the authenticated user's account.
      operationId: deleteTelegramGroup
      tags: [Integrations]
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
          description: Telegram group chat ID
      responses:
        '204':
          description: Group removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/grounding:
    get:
      summary: Preview response-grounding cost
      description: |
        Returns how many participant responses in the session are grounded vs.
        ungrounded, and the credit cost (in cents) to ground the remaining ones.
        No charge, no work performed.
      operationId: getGroundingPreview
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Grounding cost preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total participant responses in the session.
                  grounded:
                    type: integer
                    description: Responses that already have extracted quotes.
                  ungrounded:
                    type: integer
                    description: Responses not yet grounded.
                  cost_cents:
                    type: integer
                    description: Credit cost (cents) to ground all ungrounded responses (10¢ each).
                required: [total, grounded, ungrounded, cost_cents]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Ground ungrounded responses
      description: |
        Extracts verbatim quotes for every not-yet-grounded participant response
        and charges the session owner 10¢ per response actually grounded.
        Idempotent: already-grounded responses are skipped, so a repeat call with
        nothing new performs no work and no charge. Non-PRO callers receive 402
        if the owner's balance can't cover the estimate (no work is done).
      operationId: groundResponses
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Grounding result
          content:
            application/json:
              schema:
                type: object
                properties:
                  grounded:
                    type: integer
                    description: Responses grounded by this call.
                  attempted:
                    type: integer
                    description: Ungrounded responses found (some may have failed extraction).
                  charged_cents:
                    type: integer
                    description: Credits charged (cents). 0 on idempotent no-op or charge failure.
                  balance_after:
                    type: integer
                    nullable: true
                    description: Owner credit balance after the charge.
                  charge_failed:
                    type: boolean
                    description: Present and true if responses were grounded but the charge failed (a rare balance race); quotes are kept.
                  message:
                    type: string
                    description: Present on the idempotent no-op ("All responses already grounded").
                required: [grounded]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          description: Insufficient credits (non-PRO owner). No responses grounded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: payment_required
                      message:
                        type: string
                  cost_cents:
                    type: integer
                  balance_cents:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/regenerate-facilitation-prompt:
    post:
      summary: Recompose facilitation prompt
      description: |
        Recomposes the facilitation prompt and Session design recap from the
        session's current layered inputs: the Brief fields (`topic`, `goal`,
        `critical`, `context`), the host's HARMONICA.md, and the active
        template's `facilitation_prompt`.

        Returns the proposed values **without persisting** them. The caller
        should present them for host confirmation, then PATCH `/sessions/{id}`
        with `prompt`, `prompt_summary`, and `prompt_generated_from` to save
        (and optionally `template_id` + `cross_pollination` on a template
        switch).

        Pass `?templateId=<id>` to override the session's current
        `template_id` for the recompose — used by the Template switcher on
        Session design tab to preview what the prompt would look like with a
        different template, before the host commits.

        Requires **editor** access on the session.
      operationId: regenerateFacilitationPrompt
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
        - in: query
          name: templateId
          required: false
          schema:
            type: string
          description: |
            Override the session's `template_id` for this recompose. HAR-868 —
            used by the Template switcher on Session design tab.
      responses:
        '200':
          description: Proposed facilitation prompt and recap
          content:
            application/json:
              schema:
                type: object
                properties:
                  facilitation_prompt:
                    type: string
                    description: Regenerated facilitation prompt text.
                  prompt_summary:
                    type: string
                    description: Short Session design recap derived from the facilitation prompt.
                  prompt_generated_from:
                    type: object
                    description: Snapshot of the session fields used to generate this prompt.
                    properties:
                      topic:
                        type: string
                      goal:
                        type: string
                      critical:
                        type: string
                      context:
                        type: string
                    required: [topic, goal, critical, context]
                  template_id:
                    type: string
                    nullable: true
                    description: The `template_id` the recompose used (session's current, or the `templateId` query override).
                  cross_pollination_default:
                    type: boolean
                    nullable: true
                    description: |
                      `cross_pollination_default` on the target template. The
                      Template switcher surfaces a snap suggestion when this
                      differs from the session's current `cross_pollination`
                      setting.
                required:
                  - facilitation_prompt
                  - prompt_summary
                  - prompt_generated_from
                  - template_id
                  - cross_pollination_default
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          description: LLM generation failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions/{id}/regenerate-welcome:
    post:
      summary: Regenerate welcome message and meta description
      description: |
        Re-generates the participant-facing `welcome_message` and `meta_description`
        from the session's current `topic`, `goal`, `critical`, and `context` fields.

        Returns the proposed copy **without persisting** it. The caller should
        present it for host confirmation, then PATCH `/sessions/{id}` with
        `welcome_message` and `meta_description` to save.

        Requires **editor** access on the session.
      operationId: regenerateWelcome
      tags: [Sessions]
