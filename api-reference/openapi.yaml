openapi: 3.1.0
info:
  title: Harmonica API
  version: 1.0.0
  description: |
    REST API for the Harmonica structured deliberation platform.
    Provides access to sessions and their data, including creating, updating, and querying sessions, plus response submission for active sessions.
  contact:
    name: Harmonica
    url: https://harmonica.chat

servers:
  - url: https://app.harmonica.chat/api/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Local development

security:
  - apiKey: []

components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: |
        API key authentication. Pass your key as a Bearer token.
        Keys use the format `hm_live_<32 hex chars>`.
        Generate keys from your Harmonica dashboard settings.

  schemas:
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        goal:
          type: string
        critical:
          type: string
          nullable: true
        context:
          type: string
          nullable: true
        prompt:
          type: string
          nullable: true
          description: Custom facilitation prompt for the session's AI facilitator
        status:
          type: string
          enum: [active, completed]
        summary:
          type: string
          nullable: true
        session_md:
          type: string
          nullable: true
          description: Structured SESSION.md brief (auto-generated after summary)
        participant_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, topic, goal, status, participant_count, created_at, updated_at]

    SessionListItem:
      type: object
      description: Abbreviated session object returned in list endpoints.
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        goal:
          type: string
        status:
          type: string
          enum: [active, completed]
        participant_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, topic, goal, status, participant_count, created_at, updated_at]

    Template:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        facilitation_prompt:
          type: string
          nullable: true
        default_session_name:
          type: string
          nullable: true
        default_goal:
          type: string
          nullable: true
        default_critical:
          type: string
          nullable: true
        default_context:
          type: string
          nullable: true
        template_type:
          type: string
          description: 'single or chain'
        chain_config:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ChainConfig'
          description: Chain definition for chain templates; null for single templates (HAR-1098).
        cross_pollination_default:
          type: boolean
        is_public:
          type: boolean
        workspace_id:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          nullable: true
        archived_at:
          type: string
          format: date-time
          nullable: true
        source_provenance:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SourceProvenance'
          description: Provenance for a template installed from the OFL method-specs registry; null for admin-authored templates (HAR-1108).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, title, template_type, cross_pollination_default, is_public, created_at, updated_at]

    SourceProvenance:
      type: object
      description: Provenance for a template installed from the OFL method-specs registry. Null for admin-authored templates.
      properties:
        spec_id: { type: string }
        spec_version: { type: string }
        registry: { type: string }
        install_hash:
          type: string
          description: sha256 of the canonicalized chain_config as installed
        installed_at:
          type: string
          format: date-time
        installed_by:
          type: string
          nullable: true

    CreateTemplateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        facilitation_prompt:
          type: string
          nullable: true
        default_session_name:
          type: string
          nullable: true
        default_goal:
          type: string
          nullable: true
        default_critical:
          type: string
          nullable: true
        default_context:
          type: string
          nullable: true
        is_public:
          type: boolean
          default: false
        workspace_id:
          type: string
          nullable: true
          description: When set, creates a workspace-scoped template (caller must be a workspace admin).
        template_type:
          type: string
          enum: [single, chain]
          description: Pass 'chain' (with chain_config) to install a chain method-spec (HAR-1098). Defaults to 'single'.
        chain_config:
          $ref: '#/components/schemas/ChainConfig'
        source_provenance:
          type: object
          description: Spec identity for a registry install; the server stamps install_hash + timestamps (HAR-1108).
          properties:
            spec_id: { type: string }
            spec_version: { type: string }
            registry: { type: string }
          required: [spec_id, spec_version, registry]
      required: [title]

    UpdateTemplateRequest:
      type: object
      description: All fields optional; at least one must be provided.
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        facilitation_prompt:
          type: string
          nullable: true
        default_session_name:
          type: string
          nullable: true
        default_goal:
          type: string
          nullable: true
        default_critical:
          type: string
          nullable: true
        default_context:
          type: string
          nullable: true
        is_public:
          type: boolean
        template_type:
          type: string
          enum: [single, chain]
          description: Set to 'chain' to convert a single template into a chain (chain_config required) (HAR-1098).
        chain_config:
          $ref: '#/components/schemas/ChainConfig'
        source_provenance:
          type: object
          description: Spec identity for a registry re-install; the server stamps install_hash + timestamps (HAR-1108).
          properties:
            spec_id: { type: string }
            spec_version: { type: string }
            registry: { type: string }
          required: [spec_id, spec_version, registry]
        force:
          type: boolean
          description: Overwrite a template that has local edits since install (HAR-1108).

    ChainConfig:
      type: object
      description: >-
        Multi-step chain definition (used when template_type is 'chain').
        Validated server-side (HAR-915): at least one step, unique step ids,
        valid role / assignment / completion shapes.
      required: [steps]
      properties:
        steps:
          type: array
          minItems: 1
          items:
            type: object
            required: [id]
            properties:
              id:
                type: string
              title:
                type: string
              description:
                type: string
              facilitation_prompt:
                type: string
              default_session_name:
                type: string
              context_mode:
                type: string
                enum: [none, previous_summary, all_summaries, custom]
              individual_memory:
                type: boolean
              roles:
                type: array
                items:
                  type: object
                  required: [slug, label]
                  properties:
                    slug:
                      type: string
                    label:
                      type: string
                    weight:
                      type: string
                      enum: [normal, elevated, lead]
              assignment_strategy:
                type: string
                enum: [explicit, round_robin, first_come_first_served, host_assigned, all_participants]
              completion_criteria:
                type: object
                description: 'e.g. { "type": "host_continue" } or { "type": "quorum", "count": 3 }'
        output_artifact:
          type: string
          enum: [wardley]

    PublicSessionListItem:
      type: object
      description: Session object returned by the public discovery endpoint. Extends SessionListItem with a join URL.
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        goal:
          type: string
        status:
          type: string
          enum: [active]
        participant_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        join_url:
          type: string
          format: uri
          description: Direct URL for participants to join the session
      required: [id, topic, goal, status, participant_count, created_at, updated_at, join_url]

    Question:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        position:
          type: integer
      required: [id, text, position]

    Participant:
      type: object
      properties:
        participant_id:
          type: string
          format: uuid
        participant_name:
          type: string
          nullable: true
        active:
          type: boolean
          description: Whether the participant is still in conversation
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
      required: [participant_id, participant_name, active, messages]

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, role, content, created_at]

    ResponseSubmission:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 10000
      required: [content]

    ResponseCreated:
      type: object
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        content:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, session_id, content, created_at]

    UserInfo:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        subscription_status:
          type: string
          enum: [FREE, PRO, ENTERPRISE]
        api_key:
          type: object
          properties:
            name:
              type: string
              nullable: true
            key_prefix:
              type: string
            created_at:
              type: string
              format: date-time
            last_used_at:
              type: string
              format: date-time
              nullable: true
      required: [id, email, subscription_status, api_key]

    Pagination:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required: [total, limit, offset]

    CreateSessionRequest:
      type: object
      description: Request body for creating a new session.
      properties:
        topic:
          type: string
          description: Session topic / title
        goal:
          type: string
          description: What the session aims to achieve
        context:
          type: string
          description: Background context for participants (e.g. SESSION.md from a prior session)
        critical:
          type: string
          description: Critical question or constraint
        prompt:
          type: string
          description: |
            Custom facilitation prompt. If omitted, a prompt is auto-generated server-side
            from the topic, goal, context, and critical fields. Falls back to a basic
            facilitation prompt if generation fails.
        template_id:
          type: string
          description: ID of a template to use
        questions:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
            required: [text]
          description: Pre-session questions shown to participants before facilitation begins
        cross_pollination:
          type: boolean
          default: false
          description: Enable cross-pollination of ideas between participant threads
        widgets_enabled:
          type: boolean
          default: false
          description: |
            Enable AI-emitted Polls and ratings widgets (SingleSelect,
            MultiSelect, RatingScale, RankingList) during the session. When
            true, the facilitator may call widget tools mid-conversation to
            present interactive inputs instead of plain text questions.
        results_visibility:
          type: string
          enum: [public, participants, host]
          default: host
          description: |
            Who can see aggregated session results.
            - `host` (default) — only the session owner can see results.
            - `participants` — anyone who completed the session can see what
              others said (drives the end-of-chat "See what others said" link).
            - `public` — anyone with the session URL can see results without
              participating.
            MCP / harmonica-chat callers typically pass `participants` since
            programmatic and Telegram-distributed sessions usually want
            distributed visibility.
        distribution:
          type: array
          items:
            $ref: '#/components/schemas/DistributionTarget'
          description: Distribution channels for the session (e.g. Telegram groups)
      required: [topic, goal]

    DistributionTarget:
      type: object
      description: A distribution channel where the session should be announced.
      properties:
        channel:
          type: string
          enum: [telegram]
          description: Distribution channel type
        group_id:
          type: string
          description: Channel-specific group identifier (e.g. Telegram chat ID)
      required: [channel, group_id]

    ChatRequest:
      type: object
      description: Send a message in a conversational facilitation session.
      properties:
        content:
          type: string
          description: The participant's message
        participant_id:
          type: string
          description: Unique identifier for the participant (e.g. Telegram user ID)
        participant_name:
          type: string
          description: Display name of the participant
      required: [content, participant_id, participant_name]

    ChatQuestionsRequest:
      type: object
      description: Submit pre-session question answers to start facilitation.
      properties:
        participant_id:
          type: string
          description: Unique identifier for the participant
        participant_name:
          type: string
          description: Display name of the participant
        answers:
          type: array
          items:
            type: object
            properties:
              question_id:
                type: string
              answer:
                type: string
            required: [question_id, answer]
      required: [participant_id, participant_name, answers]

    ChatResponse:
      type: object
      description: Facilitator response to a chat message.
      properties:
        message:
          type: object
          properties:
            role:
              type: string
              enum: [assistant]
            content:
              type: string
              description: The facilitator's response
            is_final:
              type: boolean
              description: Whether the facilitator considers this conversation complete
          required: [role, content, is_final]
        thread_id:
          type: string
          description: The participant's thread ID in this session
      required: [message, thread_id]

    TelegramGroup:
      type: object
      description: A Telegram group registered to the user's account.
      properties:
        group_id:
          type: string
          description: Telegram chat ID
        group_name:
          type: string
          nullable: true
          description: Telegram group title
        topic_id:
          type: integer
          nullable: true
          description: Forum topic ID for bot announcements
        created_at:
          type: string
          format: date-time
      required: [group_id, created_at]

    RegisterTelegramGroupRequest:
      type: object
      properties:
        group_id:
          type: string
          description: Telegram chat ID
        group_name:
          type: string
          description: Telegram group title
        topic_id:
          type: integer
          description: Forum topic ID (if group has topics enabled)
      required: [group_id]

    SessionCreated:
      type: object
      description: Session object returned after creation. Extends SessionListItem with a join URL.
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        goal:
          type: string
        status:
          type: string
          enum: [active]
        participant_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        join_url:
          type: string
          format: uri
          description: Direct URL for participants to join the session
      required: [id, topic, goal, status, participant_count, created_at, updated_at, join_url]

    ContextSource:
      type: object
      description: A context source attached to a session (file, session snapshot, or MCP server).
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        source_type:
          type: string
          enum: [file, session, mcp, url]
        title:
          type: string
        position:
          type: integer
          description: Sort order within the session (lower = injected earlier in prompt).
        content_mode:
          type: string
          enum: [verbatim, chunked]
          nullable: true
          description: |
            `verbatim` — full text stored in the row.
            `chunked` — text split and embedded in `session_embeddings` for vector retrieval.
            `null` for MCP sources (no stored content).
        source_ref:
          type: string
          format: uuid
          nullable: true
          description: For `session` sources — the ID of the referenced session.
        mcp_config:
          type: object
          nullable: true
          description: For `mcp` sources — connection config and cached tool list.
          properties:
            url:
              type: string
              format: uri
            bearer:
              type: string
              nullable: true
            tool_allowlist:
              type: array
              nullable: true
              items:
                type: string
            cached_tools:
              type: array
              items:
                type: string
            consecutive_fails:
              type: integer
            status:
              type: string
              enum: [healthy, unhealthy]
        token_estimate:
          type: integer
          nullable: true
          description: Estimated token count for verbatim content.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, session_id, source_type, title, position, created_at, updated_at]

    SessionKnowledge:
      type: object
      description: |
        Structured, typed knowledge synthesised from a session — decisions,
        action items, tensions, and atomic claims — each carrying message-ID
        provenance. Generated after the session summary. Pro feature.
      properties:
        decisions:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              summary:
                type: string
              evidence:
                type: array
                description: Source message IDs backing this decision.
                items:
                  type: string
              phase:
                type: string
            required: [label, summary, evidence]
        actions:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              owner:
                type: string
              due:
                type: string
              evidence:
                type: array
                items:
                  type: string
            required: [description, evidence]
        tensions:
          type: array
          items:
            type: object
            properties:
              summary:
                type: string
              sides:
                type: array
                minItems: 2
                items:
                  type: string
              evidence:
                type: array
                items:
                  type: string
            required: [summary, sides, evidence]
        claims:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
                enum: [decision, tension, action, open-question, observation, quote, minority-view]
              text:
                type: string
              evidence:
                type: array
                items:
                  type: string
              phase:
                type: string
              strength:
                type: number
                minimum: 0
                maximum: 1
            required: [category, text, evidence]
        gaps:
          type: array
          description: Areas the session left unresolved (optional).
          items:
            type: string
        metadata:
          type: object
          properties:
            generatedAt:
              type: integer
              description: Unix epoch timestamp when the knowledge was generated.
            model:
              type: string
            version:
              type: integer
              enum: [1]
          required: [generatedAt, model, version]
      required: [decisions, actions, tensions, claims, metadata]

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - unauthorized
                - forbidden
                - not_found
                - validation_error
                - rate_limited
                - internal_error
                - unprocessable
            message:
              type: string
          required: [code, message]
      required: [error]

  parameters:
    sessionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Session ID

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: unauthorized
              message: Invalid or missing API key
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: forbidden
              message: You don't have access to this session
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: not_found
              message: Session not found
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds to wait before retrying
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: rate_limited
              message: Rate limit exceeded. Try again in 30 seconds.

paths:
  /me:
    get:
      summary: Get current user
      description: Returns user info and API key metadata for the authenticated user.
      operationId: getMe
      tags: [Account]
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /templates:
    get:
      summary: List templates
      description: |
        Returns templates visible to the authenticated user: public global
        templates, templates they own, and (when `workspace_id` is provided and
        they have access) that workspace's templates. Archived templates are excluded.
      operationId: listTemplates
      tags: [Templates]
      parameters:
        - name: workspace_id
          in: query
          schema:
            type: string
            format: uuid
          description: Also include templates scoped to this workspace (caller must have access).
      responses:
        '200':
          description: List of templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
                required: [data]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No access to the requested workspace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create template
      description: |
        Creates a template owned by the authenticated user. Private and
        user-scoped by default; provide `workspace_id` to create a
        workspace-scoped template (caller must be a workspace admin).

        Pass `template_type: chain` with a `chain_config` to install a chain
        method-spec (HAR-1098). Chain creation is subject to the same per-plan
        step cap as launching a chain (Free is capped; paid is unlimited).
      operationId: createTemplate
      tags: [Templates]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          description: Validation error (missing required fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: >-
            Must be a workspace admin to create a workspace template, or the
            chain step count exceeds the caller's plan limit (HAR-1098).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /templates/{id}:
    get:
      summary: Get template
      description: Returns a single template the caller can read.
      operationId: getTemplate
      tags: [Templates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No access to this template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Update template
      description: |
        Updates a template. Caller must be the owner, a workspace admin (for
        workspace-scoped templates), or a global admin.

        Set `template_type: chain` with a `chain_config` to convert a single
        template into a chain, or send `chain_config` to edit an existing
        chain (HAR-1098). Subject to the same per-plan step cap as chain launch.
      operationId: updateTemplate
      tags: [Templates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: Updated template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          description: >-
            Validation error (no updatable fields), or the template has local
            edits since install and `force` was not set (HAR-1108).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: >-
            No permission to edit this template, or the chain step count exceeds
            the caller's plan limit (HAR-1098).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete template
      description: |
        Deletes a template. Caller must be the owner, a workspace admin (for
        workspace-scoped templates), or a global admin.
      operationId: deleteTemplate
      tags: [Templates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Template deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: No permission to delete this template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sessions:
    post:
      summary: Create session
      description: |
        Creates a new deliberation session owned by the authenticated user.
        If `prompt` is omitted, a facilitation prompt is auto-generated server-side
        from the topic, goal, context, and critical fields (with a fallback to a basic prompt).
        Returns the created session with a `join_url` for sharing with participants.
      operationId: createSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCreated'
        '400':
          description: Validation error (missing required fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: validation_error
                  message: topic is required
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      summary: List sessions
      description: |
        Returns sessions the authenticated user has access to (owns or participates in).
        Results are ordered by most recently updated first.
      operationId: listSessions
      tags: [Sessions]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed]
          description: Filter by session status
        - name: q
          in: query
          schema:
            type: string
          description: Search sessions by topic or goal
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of results per page
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of results to skip
        - name: distribution_channel
          in: query
          schema:
            type: string
            enum: [telegram]
          description: Filter by distribution channel
        - name: distribution_group_id
          in: query
          schema:
            type: string
          description: Filter by distribution group ID
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                required: [data, pagination]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions/public:
    get:
      summary: List public sessions
      description: |
        Returns active sessions that hosts have marked as publicly accessible.
        No authentication required. Rate-limited by IP address (100 req/min).
        Use this endpoint to discover participation opportunities.
      operationId: listPublicSessions
      tags: [Public]
      security: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search sessions by topic or goal
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of results per page
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of results to skip
      responses:
        '200':
          description: List of public sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PublicSessionListItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                required: [data, pagination]
        '429':
          $ref: '#/components/responses/RateLimited'

  /sessions/{id}:
    get:
      summary: Get session
      description: Returns full details of a session the user has access to.
      operationId: getSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update session
      description: |
        Update session metadata. At least one field must be provided.
        Requires editor role or higher on the session.
      operationId: updateSession
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  type: string
                goal:
                  type: string
                context:
                  type: string
                critical:
                  type: string
                prompt:
                  type: string
                  description: Custom facilitation prompt for the AI facilitator
              minProperties: 1
      responses:
        '200':
          description: Updated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Validation error (no valid fields provided)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: validation_error
                  message: "No valid fields provided. Allowed fields: topic, goal, context, critical, prompt"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{id}/questions:
    get:
      summary: Get session questions
      description: Returns the facilitation questions/prompts for a session.
      operationId: getSessionQuestions
      tags: [Sessions]
      parameters:
        - $ref: '#/components/parameters/sessionId'
      responses:
        '200':
          description: Session questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Question'
